<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">AI Parking Command Center</title>
  <defs>
    <linearGradient id="navy" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061d4f"/>
      <stop offset="1" stop-color="#073779"/>
    </linearGradient>
    <linearGradient id="cyan" x1="20" y1="12" x2="50" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24c8ff"/>
      <stop offset="1" stop-color="#0783ed"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#navy)"/>

  <!-- Compact AI circuit mark -->
  <path d="M25 19c0-5 4-8 8-8 3 0 6 2 7 5 5-1 9 3 9 8 4 1 6 4 6 8 0 3-2 6-5 7"
        fill="none" stroke="url(#cyan)" stroke-width="3" stroke-linecap="round"/>
  <path d="M31 17h5v5m8-2v5h5m-3 7h5" fill="none" stroke="#22c7ff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="30" cy="17" r="2" fill="#22c7ff"/>
  <circle cx="44" cy="19" r="2" fill="#22c7ff"/>
  <circle cx="46" cy="32" r="2" fill="#22c7ff"/>

  <!-- Building and parking P -->
  <path d="M12 54V28l15-8v34h-6v-8h-4v8h-5Zm5-22v5l4-2v-5l-4 2Zm0 9v5l4-2v-5l-4 2Z" fill="#fff"/>
  <path d="M27 20h10c9 0 14 5 14 12s-5 12-14 12h-3v10h-7V20Zm7 7v10h3c5 0 7-2 7-5s-2-5-7-5h-3Z" fill="#fff"/>

  <!-- AI accent -->
