  <path d="m37 52 2.4-6h2.2l2.4 6h-1.9l-.4-1.2h-2.5l-.4 1.2H37Zm2.7-2.7h1.5l-.8-2.2-.7 2.2ZM45 46h1.8v6H45z" fill="#06265c"/>

  <!-- Cursor -->
