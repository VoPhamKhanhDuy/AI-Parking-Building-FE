name: parkingsystem

services:
  postgres:
    image: postgres:16-alpine
    container_name: parkingsystem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parkingdb}
      POSTGRES_USER: ${POSTGRES_USER:-parkinguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkingpass}
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parkinguser} -d ${POSTGRES_DB:-parkingdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - parking-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: parkingsystem-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@parking.local.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-adminpass}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parking-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parkingsystem-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-parkingdb};Username=${POSTGRES_USER:-parkinguser};Password=${POSTGRES_PASSWORD:-parkingpass}"
      JwtSettings__Secret: ${JWT_SECRET:-YourSuperSecretKeyThatShouldBeAtLeast32CharactersLong!}
      JwtSettings__Issuer: ${JWT_ISSUER:-ParkingSystemAPI}
      JwtSettings__Audience: ${JWT_AUDIENCE:-ParkingSystemClient}
      JwtSettings__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
    ports:
      - "${API_PORT:-5000}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - parking-net

volumes:
  postgres_data:
    name: parkingsystem_postgres_data
  pgadmin_data:
    name: parkingsystem_pgadmin_data

networks:
  parking-net:
    name: parking-net
    driver: bridge
