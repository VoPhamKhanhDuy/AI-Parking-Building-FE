name: parkingsystem

services:
  postgres:
    image: postgres:16-alpine
    container_name: parkingsystem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-parkingdb}
      POSTGRES_USER: ${POSTGRES_USER:-parkinguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkingpass}
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parkinguser} -d ${POSTGRES_DB:-parkingdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - parking-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: parkingsystem-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@parking.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-adminpass}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parking-net

volumes:
  postgres_data:
    name: parkingsystem_postgres_data
  pgadmin_data:
    name: parkingsystem_pgadmin_data

networks:
  parking-net:
    name: parking-net
    driver: bridge